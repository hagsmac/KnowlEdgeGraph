<style>
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;padding:1rem 0}
.tile{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:11px 13px;cursor:pointer}
.tile:hover{background:var(--color-background-primary);border-color:var(--color-border-secondary)}
.tile.active{border-color:var(--color-border-primary);background:var(--color-background-primary)}
.tr{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.tn{font-size:12px;font-weight:500;color:var(--color-text-primary);line-height:1.35}
.tc{font-size:10px;color:var(--color-text-tertiary);background:var(--color-background-tertiary);padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.tt{font-size:10px;color:var(--color-text-tertiary);margin-top:3px}
.detail{display:none;grid-column:1/-1;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:15px;margin-top:2px}
.detail.open{display:block}
.dt{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{font-size:10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:3px 9px;color:var(--color-text-secondary);cursor:pointer}
.pill:hover{border-color:var(--color-border-info);color:var(--color-text-info)}
.hint{font-size:10px;color:var(--color-text-tertiary);margin-top:9px}
.sr{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:4px}
.st{font-size:12px;color:var(--color-text-secondary)}.st strong{color:var(--color-text-primary);font-weight:500}
</style>

let act=null;
function render(){
  const g=document.getElementById('g'),d=document.getElementById('d');
  g.innerHTML='';
  cats.forEach((c,i)=>{
    const t=document.createElement('div');
    t.className='tile'+(act===i?' active':'');
    t.innerHTML=`<div class="tr"><span class="tn">${c.n}</span><span class="tc">${c.a.length}</span></div><div class="tt">${c.t}</div>`;
    t.onclick=()=>{act=act===i?null:i;render();if(act!==null)setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'nearest'}),60);};
    g.appendChild(t);
  });
  if(act!==null){
    const c=cats[act];
    d.className='detail open';
    d.innerHTML=`<div class="dt">${c.n} — ${c.a.length} atomic notes</div><div class="pills">${c.a.map(a=>`<span class="pill" onclick="sendPrompt('Generate a complete tripartite atomic Obsidian note for ${a}')">${a}</span>`).join('')}</div><div class="hint">Click any algorithm to generate its atomic note →</div>`;
  }else{d.className='detail';d.innerHTML='';}
}
render();
