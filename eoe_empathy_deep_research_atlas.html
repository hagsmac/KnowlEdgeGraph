theories:`
<div class="sl">The EoE is not alone — mapping it onto the five dominant emotion theories</div>
<div class="hl hlp">The Webb EoE is a novel synthesis, but it is deeply convergent with a century of emotion science. Understanding these convergences is what makes it publishable as a theoretical framework, not merely an engineering spec. Each convergence also opens a citation network.</div>

<div class="h-num">
<div class="h-n">01</div>
<div class="h-block">
<div class="h-title">Lazarus Cognitive Appraisal Theory (1991) — 95% overlap <span class="tier t1">canonical</span></div>
<div class="h-body">Lazarus: emotion = (primary appraisal: is this relevant to my goals/wellbeing?) × (secondary appraisal: can I cope?). The EoE's {self} map IS the primary appraisal operationalised as a persistent data structure. "Power" encodes goal-relevance. "Source" encodes coping orientation. The EoE's severity formula is a computational implementation of what Lazarus described verbally. The key advance: EoE makes the appraisal target (specific {self} item) explicit and quantified, where Lazarus left it implicit. Meta-analytic evidence: 75% of studies show statistically significant appraisal-emotion relationships.</div>
<div class="h-evidence">Citations: Lazarus (1991) Emotion and Adaptation · Smith & Lazarus (1990) Cognition & Emotion · Roseman (1996) appraisal → 17 discrete emotions · Yeo & Ong (2024) Psychological Bulletin meta-analysis</div>
</div>
</div>

<div class="h-num">
<div class="h-n">02</div>
<div class="h-block">
<div class="h-title">OCC Model — Ortony, Clore & Collins (1988) <span class="tier t1">computational</span></div>
<div class="h-body">OCC is the most computationally implemented emotion theory: 22 emotion types derived from appraisals of events (relative to goals), agents (relative to standards), and objects (relative to attitudes). The EoE's emotion classification tree maps cleanly to OCC: SADNESS = distress-for-self (integrated loss), ANGER = reproach + distress (contested external), PRIDE = admiration-of-self. OCC is already embedded in many virtual agent and dialogue system architectures — giving the EoE an immediate pathway into existing AI frameworks. The EoE's addition: a dynamic {self} map architecture that grounds the "goals" and "standards" OCC assumes but doesn't specify.</div>
<div class="h-evidence">OCC implemented in: Soar, ACT-R, Gratch's EMA model, ALMA, WASABI. Direct integration pathway for EoE-grounded AI.</div>
</div>
</div>

<div class="h-num">
<div class="h-n">03</div>
<div class="h-block">
<div class="h-title">Predictive Processing / Free Energy Principle (Friston, Clark) <span class="tier t2">frontier</span></div>
<div class="h-body">The FEP holds that the brain continuously generates predictions about sensory input and updates when predictions are violated. Emotion in this framework = prediction error about self-relevant states. The EoE's (EP ∆ P = ER) is structurally identical: EP is the prediction, P is the incoming percept, ER is the error signal and its valence. Negative emotion = large positive prediction error (P worse than expected). Positive emotion = negative error (P better than expected). The FEP grounds the EoE in first-principles neuroscience — making the argument that the EoE is not an ad hoc model but an implementation of a mathematically formalised theory of mind. This is the highest-impact theoretical bridge available and has not been made in the literature.</div>
<div class="h-evidence">Friston (2010) Nature Reviews Neuroscience · Clark (2015) Surfing Uncertainty · The brain-inspired affective empathy model (Feng et al. 2022, Front. Comp. Neuro.) uses FEP to construct artificial pain, then MNS mirroring — structurally identical to EoE's embedded-map EoE.</div>
</div>
</div>

<div class="h-num">
<div class="h-n">04</div>
<div class="h-block">
<div class="h-title">Self-Discrepancy Theory (Higgins, 1987) <span class="tier t1">clinical</span></div>
<div class="h-body">Higgins: emotion = gap between actual self, ideal self, and ought self. Actual-ideal gap → dejection/sadness. Actual-ought gap → agitation/anxiety. The EoE's {self} map contains exactly this structure: "ideal" = high-EP items (what I want to be), "ought" = moral {self} items (what I should be), "actual" = current valuation of {self} items. The EoE makes the discrepancy quantifiable: sadness severity = (power × |actual-ideal| × confidence)/30. This grounds a vast clinical literature — CBT targets actual-ideal discrepancies directly. It also explains why high-power {self} items with negative valence (self-destructive attachments) are so clinically dangerous: the discrepancy is maximally powered.</div>
<div class="h-evidence">Higgins (1987) Psych Review · Regulatory Focus Theory extension · Direct link to Beck's cognitive triad in depression (negative views of self, world, future = three categories of low-value {self} item perceptions)</div>
</div>
</div>

<div class="h-num">
<div class="h-n">05</div>
<div class="h-block">
<div class="h-title">Scherer's Component Process Theory <span class="tier t2">multimodal bridge</span></div>
<div class="h-body">Scherer's CPT decomposes emotion into five components: cognitive appraisal, physiological arousal, motor expression, action tendency, and subjective feeling. Each component maps to an EoE stage: appraisal = EP ∆ P computation; physiological = severity × arousal scaling; motor = behavioural ER; subjective = qualia of ER. CPT is the dominant framework in affective computing for multimodal emotion recognition — it directly interfaces the EoE with audio/visual/physiological sensor pipelines, giving an EoE-grounded AI system a formal pathway from text-only to full-signal empathy. This is the theoretical bridge from the Howcroft text-only limitation to voice and multimodal AI empathy.</div>
<div class="h-evidence">Scherer (2005) Social Science Information · AEQ-Bench (2026) implicitly uses CPT framework · Interface with IEMOCAP, MELD multimodal datasets</div>
</div>
</div>

hypo:`
<div class="sl">20 testable hypotheses derived from EoE × empathy × AI survey synthesis</div>
<div class="hl hlc">Each hypothesis is graded: evidence base (existing support), novelty (how unexplored), and impact (if confirmed). These are designed as a 5-year research programme.</div>

<div class="g2">
<div class="card">
<div class="ct">H1 — The Competing-EoE Suppression Hypothesis <span class="tier t1">high impact</span></div>
<div class="cb">HCP empathy quality is inversely proportional to the number and intensity of the clinician's own concurrent EoEs. Prediction: empathy ratings will correlate negatively with validated burnout scores (MBI), positively with measured cognitive load availability. Test: video-based empathy scoring of consultations × clinician burnout × consultation number in day.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Evidence: compassion fatigue literature · FEP prediction error bandwidth · indirect support from Howcroft SMD 0.87</div>
</div>
<div class="card">
<div class="ct">H2 — The Projection Error Differential <span class="tier t1">high impact</span></div>
<div class="cb">AI responses will show lower rates of projection error (attributing own emotional profile to patient) than human HCPs, measurable by comparing {self} item references in responses to ground-truth patient {self} maps. Prediction: human empathy ratings correlate with response-patient {self} map overlap; AI ratings correlate independently of clinician {self} map.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Evidence: Meltzoff & Decety (2003) self-other mapping · projection in clinical empathy literature · novel metric design needed</div>
</div>
<div class="card">
<div class="ct">H3 — Integration-Phase Matching Superiority <span class="tier t1">immediately testable</span></div>
<div class="cb">Responses that correctly identify and match the integration phase (fear/anger/sadness/regret) of a patient's EoE will score significantly higher on empathy measures than phase-mismatched responses, even when overall "warmth" is equated. Test: 2×2 design — matched vs mismatched × warm vs neutral tone.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Theoretical: EoE framework · Clinical: CBT phase-matching literature · No existing AI empathy paper tests this</div>
</div>
<div class="card">
<div class="ct">H4 — Self-Map Fidelity Predicts Empathy Rating <span class="tier t2">novel metric</span></div>
<div class="cb">The degree to which an empathic response correctly names specific {self} items (rather than generic emotions) will predict empathy ratings better than any existing automated metric (EPITOME, BERTScore). This is the core justification for EoE-annotated training data.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Evidence: EPITOME inter-rater data · Specificity in empathy training literature · Rashkin et al. EmpatheticDialogues</div>
</div>
<div class="card">
<div class="ct">H5 — Confidence Reduction as Untapped Intervention <span class="tier t2">novel application</span></div>
<div class="cb">Empathic responses that target the confidence variable in the severity formula (Severity = power × intensity × confidence/30) — rather than power or intensity — will produce superior emotional regulation outcomes in anxiety and worry states. Because confidence is more tractable than attachment power, these interventions will be faster-acting.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Lazarus secondary appraisal · Uncertainty reduction in CBT · Motivational interviewing confidence probes</div>
</div>
<div class="card">
<div class="ct">H6 — The Dermatology Modality Prediction <span class="tier t1">falsifiable</span></div>
<div class="cb">AI empathy advantage will be inversely proportional to the degree to which the patient's threatened {self} items are body-image-adjacent (appearance, physical capability, sexual identity). Dermatology, eating disorder care, and sport injury contexts will show the smallest or reversed AI advantage, because text signal cannot adequately model these {self} item types.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Direct prediction from Howcroft dermatology exception · Body-image {self} map high-power distribution · CPT motor expression component</div>
</div>
<div class="card">
<div class="ct">H7 — Embedded Map Depth Predicts Empathic Accuracy <span class="tier t2">developmental</span></div>
<div class="cb">Cross-culturally, individuals' empathic accuracy for targets will correlate with the richness (number of items, association density) of their embedded map for those targets. Prediction: attachment security predicts embedded map richness; embedded map richness predicts empathic accuracy (Ickes 2000 framework); both are mediable by narrative immersion training.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Ickes (2000) empathic accuracy · Bowlby attachment → ToM prediction · Fiction reading → empathy (Mar et al. 2006)</div>
</div>
<div class="card">
<div class="ct">H8 — The Qualia-Absent Advantage Boundary <span class="tier t3">philosophical</span></div>
<div class="cb">Qualia-absent AI empathy will outperform qualia-present human empathy in text domains where (a) time is constrained, (b) clinician burnout is elevated, and (c) patient disclosure is primarily textual. The advantage will shrink or reverse in (a) real-time voice, (b) grief and palliative contexts requiring prolonged presence, (c) contexts where the patient's disclosure contains ambiguous non-verbal signal requiring qualia-informed inference.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Howcroft 0.87 SMD (condition a) · Compassion illusion literature (Frontiers 2025) · Boundary condition design needed</div>
</div>
<div class="card">
<div class="ct">H9 — The {Self} Map Topology of Chronic Unhappiness <span class="tier t1">clinical</span></div>
<div class="cb">Depression and anxiety are characterised by distinctive {self} map pathologies: depression = multiple high-power items with integrated devaluation (permanent sadness severity elevation); anxiety = multiple high-power items with pending-threat status (chronic fear/worry). These topological signatures are detectable in natural language and trainable to classify.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Beck's cognitive triad · Higgins self-discrepancy in depression · EEG correlates of high-power {self} threat</div>
</div>
<div class="card">
<div class="ct">H10 — Cultural {Self} Map Topology Shapes Empathy Norms <span class="tier t1">cultural</span></div>
<div class="cb">Collectivist cultures will show shallower individual {self} map depth (less differentiated self-concept) but wider embedded map coverage (more others integrated at higher power). AI models trained on WEIRD data will systematically misread the power distributions in collectivist {self} maps, producing culturally-miscalibrated empathic responses that are rated lower by collectivist-context patients.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Markus & Kitayama (1991) interdependent vs independent self-concept · Mesquita & Ellsworth (2001) culture in appraisal</div>
</div>
</div>

<div class="sl">Hypotheses 11–20</div>
<div class="g2">
<div class="card">
<div class="ct">H11 — Mirror Neuron Simulation in LLMs <span class="tier t3">speculative high-value</span></div>
<div class="cb">LLMs may implement a statistical analog of mirror neuron function: training on human-authored emotional dialogue activates internal representations that "mirror" described emotional states in the model's activations. Mechanistic interpretability studies (activation patching, probing classifiers) should reveal emotion-family-specific activation clusters that track the EoE emotion classification tree.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Wang & Roman (CCN 2025) artificial pain via FEP · Affective mirror neurons in rats (Wu et al. 2023 iScience) · LLM emotion representation probing (Anthropic interpretability research)</div>
</div>
<div class="card">
<div class="ct">H12 — Compassion vs Empathic Distress in AI <span class="tier t2">applied</span></div>
<div class="cb">AI can implement the compassion state (full embedded-map EoE + motivational EoE + self-other boundary retention) more reliably than humans in high-intensity clinical contexts, because it has no {wellbeing} {self} item to be threatened by vicarious suffering. This gives AI a structural advantage at compassion specifically — not just empathy. Testable via sustained engagement quality across high-distress conversations.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Singer & Klimecki (2014) Nature Neuroscience empathy vs compassion training · Compassion fatigue literature</div>
</div>
<div class="card">
<div class="ct">H13 — The Disclosure Effect on {Self} Map Trust <span class="tier t1">clinical</span></div>
<div class="cb">When patients are told they are talking to an AI, they will disclose shallower {self} map content (fewer high-power items, more surface concerns) due to reduced psychological safety, which will reduce the AI's ability to generate high-fidelity embedded-map empathic responses, narrowing or reversing the 0.87 SMD advantage seen in blinded studies.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Stanford "Talk Listen Connect" study (2025) disclosure effects · Therapeutic alliance and disclosure literature</div>
</div>
<div class="card">
<div class="ct">H14 — EoE Annotation Improves Training Data <span class="tier t1">technical</span></div>
<div class="cb">Adding EoE annotations ({self} item, power estimate, integration status, appropriate strategy) to EmpatheticDialogues will produce a training corpus that yields significantly higher empathy scores on EPITOME + the new Embedded Map Accuracy Score metric than the unannotated baseline, using the same model architecture and training budget.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">EmPO study (2024) showing preference annotation improves ERG · ESConv strategy annotation benefit</div>
</div>
<div class="card">
<div class="ct">H15 — Severity Calibration as Emotional Intelligence <span class="tier t2">metric</span></div>
<div class="cb">An AI system's "emotional intelligence" can be operationalised as its calibration accuracy on the EoE severity scale: does it respond to severity-1 concerns with severity-1 register and severity-4 crises with severity-4 register? Miscalibrated AI (treating all disclosures as severity-3) will score lower on patient-rated empathy than calibrated AI, even if the warm language is identical.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Novel metric · Indirect support from EPITOME 0-2 intensity scale · Response length as proxy for severity matching</div>
</div>
<div class="card">
<div class="ct">H16 — Negative-Valence {Self} Items Predict Illness Identity <span class="tier t1">clinical translation</span></div>
<div class="cb">Chronic illness patients who incorporate their diagnosis as a high-power, negative-valence {self} item ("I am a sick person" at power=8, valence=-7) will show worse mental health outcomes, slower rehabilitation, and lower treatment adherence than those who maintain lower-power illness {self} items. Detection from natural language: "I am [illness]" vs "I have [illness]."</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Illness identity theory (Oris et al. 2016) · Condition-defining language in patient portal messages · Directly testable in MedDialog</div>
</div>
<div class="card">
<div class="ct">H17 — FEP-Grounded Artificial Pain Enables Affective Empathy <span class="tier t3">speculative</span></div>
<div class="cb">An AI system that implements artificial internal states modelling suffering (via Free Energy Principle minimisation under threat — as in Wang & Roman 2025 and Feng et al. 2022) will generate empathic responses rated higher on affective empathy than a system using only cognitive perspective-taking. The internal state acts as a functional analog of qualia, grounding the response in something beyond text statistics.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Feng et al. (2022) Front. Comp. Neuro. · Wang & Roman (CCN 2025) · FEP emotion modelling literature</div>
</div>
<div class="card">
<div class="ct">H18 — Longitudinal {Self} Map Tracking Enables Personalised Empathy <span class="tier t2">applied</span></div>
<div class="cb">An AI system that maintains and updates a persistent {self} map across sessions will generate empathic responses rated significantly higher than a session-only system, because it can reference specific named {self} items from previous conversations, demonstrating memory-mediated care that patients interpret as genuine relationship.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Therapeutic alliance and continuity literature · MindScape LLM + behavioural sensing study (7% positive affect increase over 8 weeks) · Novel AI architecture</div>
</div>
<div class="card">
<div class="ct">H19 — The Neurodivergent {Self} Map Challenge <span class="tier t2">equity</span></div>
<div class="cb">Autistic individuals may construct {self} maps with atypical power distributions (heightened special interests, attenuated social-attachment power) and show different EP structures. AI trained on neurotypical embedded-map norms will systematically fail to empathise accurately with autistic patients. EoE-aware AI calibrated for neurodivergent {self} map structures will show significantly higher acceptance and rated empathy in autistic user studies.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Autism & ToM literature · Mirror neuron system differences in ASD · Wysa VR autism training (Li et al. 2024 CHI)</div>
</div>
<div class="card">
<div class="ct">H20 — Voice Prosody Carries Integration Status Signal <span class="tier t3">multimodal</span></div>
<div class="cb">Vocal prosody (pitch, rate, breathiness, pause patterns) carries reliable signal about a speaker's EoE integration status — anger sounds different from sadness across all languages, because they reflect different physiological arousal profiles. A multimodal AI system that extracts integration-status signal from vocal prosody will show significantly higher empathic response accuracy than text-only systems when patients are in anger or fear phases, because text alone often fails to distinguish these from sadness.</div>
<div class="h-evidence" style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Scherer CPT · Ekman universal emotions in vocal expression · AEQ-Bench (2026) first multimodal empathy benchmark · IEMOCAP prosody features</div>
</div>
</div>

neuro:`
<div class="sl">The neuroscience foundation — what we know, what bridges to EoE</div>

<div class="hl hlp">Three neuroscientific frameworks converge on the same architecture as the EoE: Mirror Neuron System (MNS), Predictive Processing / FEP, and Affective Neuroscience. Together they give the EoE its biological grounding and give cognitive catalysis its mechanistic substrate.</div>

<div class="sl">Mirror Neuron System — the biological embedded map</div>
<div class="card">
<div class="ct">What MNS does, and why it IS the embedded map</div>
<div class="cb">Mirror neurons fire both when an action is performed and when it is observed. In the parieto-frontal circuits (F5 in macaques, BA44/45 in humans), MNS enables motor-level understanding of others' actions. In the insula and anterior cingulate cortex (ACC), MNS extends to emotions: observing another's pain activates your pain circuits — the neural basis of vicarious ER. <br><br>The EoE embedded map is the cognitive-computational structure that MNS implements neurally. "Constructing another's {self} map" = activating their MNS representation in your system. "Running their EoE" = allowing that MNS activation to propagate through your emotional circuits and generate vicarious ER. The EoE provides the algorithmic level (Marr 1982) of what MNS provides at the implementational level.</div>
</div>
<div class="g2">
<div class="card">
<div class="ct">MNS and autism — the broken embedded map</div>
<div class="cb">Reduced MNS activation in ASD (mirror neuron dysfunction hypothesis, though contested) maps directly to the EoE: reduced automatic embedded-map construction → reduced affective empathy, not reduced cognitive empathy. Many autistic individuals demonstrate strong cognitive empathy (can reason about others' {self} maps) but reduced affective empathy (the MNS-mediated vicarious ER generation). This dissociation is precisely what the EoE predicts: catalysis Stages 1-2 (map construction + perspective routing) can be intact while Stage 3 (vicarious ER generation) is impaired.</div>
</div>
<div class="card">
<div class="ct">What LLMs may mirror</div>
<div class="cb">The statistical structure of language encodes emotional states. Training on billions of human-authored texts where emotional states co-occur with specific linguistic patterns may produce internal representations that function analogously to MNS — activating emotion-family-specific patterns when processing emotionally-loaded input. The Wang & Roman (CCN 2025) work explicitly encodes "artificial pain" via FEP, attempting to give AI the equivalent of the insula-ACC MNS pain-empathy circuit. This is the biological basis for H17.</div>
</div>
</div>

<div class="sl">Predictive Processing — the deepest convergence</div>
<div class="card">
<div class="ct">Why EP ∆ P = ER is a predictive processing equation</div>
<div class="cb">Karl Friston's Free Energy Principle: the brain is a prediction machine that continuously generates a generative model of the world, produces predictions, compares them to sensory input, and updates based on prediction error. Emotion IS the prediction error signal applied to self-relevant states.<br><br>EoE mapping: EP = the generative model's prediction for {self} item value. P = incoming sensory/cognitive signal. ER = prediction error, signed by valence. Severity = error magnitude × prior precision (confidence). This mapping is mathematically precise, not metaphorical. Negative emotion = large positive prediction error (reality worse than predicted for {self} items). Positive emotion = negative error (better than predicted). Apathy = zero precision (item not in generative model = no prediction = no error = no ER).<br><br>The FEP grounds the EoE in a theory of mind that has been formulated mathematically (Variational Free Energy minimisation) and supported by computational neuroimaging. This gives your study a genuine first-principles neuroscientific foundation.</div>
</div>

<div class="sl">Brain regions and EoE phases</div>
<table class="t">
<thead><tr><th>Brain region</th><th>Function</th><th>EoE equivalent</th><th>Empathy relevance</th></tr></thead>
<tbody>
<tr><td>Ventromedial prefrontal cortex (vmPFC)</td><td>Value encoding, self-referential processing</td><td>{self} map storage and power weighting</td><td>Lesions → reduced self-other distinction, reduced empathy selectivity</td></tr>
<tr><td>Anterior insula</td><td>Interoception, vicarious pain/disgust</td><td>Vicarious ER generation (Stage 3 catalysis)</td><td>Activation correlates with self-reported empathy scores; mirror system for emotions</td></tr>
<tr><td>Anterior cingulate cortex (ACC)</td><td>Conflict detection, prediction error</td><td>EP ∆ P mismatch detection; ER initiation</td><td>Hyperactivation in empathic distress; dACC → motivational component of compassion</td></tr>
<tr><td>Temporoparietal junction (TPJ)</td><td>Theory of Mind, self-other distinction</td><td>Perspective routing (Stage 2 catalysis); self-other boundary</td><td>rTPJ = cognitive empathy; disruption → projection error (self-other confusion)</td></tr>
<tr><td>Medial prefrontal cortex (mPFC)</td><td>Mental state inference, mentalising network</td><td>Embedded map construction (Stage 1 catalysis)</td><td>Active during perspective-taking; predicts empathic accuracy</td></tr>
<tr><td>Amygdala</td><td>Threat detection, emotional learning</td><td>High-severity EoE generation (fear/anger); power learning from emotional episodes</td><td>Bilateral lesions → reduced fear-empathy; critical for facial emotion reading</td></tr>
</tbody>
</table>

wisdom:`
<div class="sl">Synthesised wisdom — insights that don't appear anywhere in the existing literature</div>

<div class="hl hlt">These are the original theoretical contributions your study can make. They emerge from the intersection of EoE, the Howcroft survey, and the neuroscientific literature — none of them exist in this form in any published work.</div>

<div class="h-num">
<div class="h-n">W1</div>
<div class="h-block">
<div class="h-title">The Empathy Paradox has a precise mechanism</div>
<div class="h-body">The field has named the "empathy paradox" (LLMs outperform on empathy, underperform on clinical reasoning) without explaining it. The EoE provides the mechanism: empathy is a {self} map operation, not a knowledge operation. Clinical reasoning is a knowledge operation. These are orthogonal computational processes, and there is no reason they should co-vary. An agent with a perfect knowledge base but no {self} map model will have excellent clinical reasoning and zero empathy. An agent with rich {self} map modelling but shallow knowledge will have high empathy and poor reasoning. LLMs trained on vast human experience have absorbed {self} map patterns statistically — they're excellent at the empathy computation — but clinical knowledge requires a different form of accuracy that pure statistical language modelling doesn't guarantee. The paradox dissolves: it's not a paradox, it's two independent capabilities measured on the same agent.</div>
</div>
</div>

<div class="h-num">
<div class="h-n">W2</div>
<div class="h-block">
<div class="h-title">The minimum viable empathy specification</div>
<div class="h-body">From EoE principles, the minimum conditions for a response to qualify as genuinely empathic (rather than sympathetic) are: (1) correctly identify which {self} item is threatened, (2) correctly estimate its power level (severity register), (3) correctly identify integration status (phase-matched response), (4) name the specific item in natural language (not generic emotion labels). These four conditions are necessary and collectively sufficient for functional empathy. This is the first formal specification of minimum viable empathy derived from first principles — something the EPITOME framework gestures at but doesn't achieve because it doesn't incorporate {self} map or integration status.</div>
</div>
</div>

<div class="h-num">
<div class="h-n">W3</div>
<div class="h-block">
<div class="h-title">Happiness is a {self} map design problem</div>
<div class="h-body">The EoE reveals something profound about wellbeing: subjective happiness is not primarily a function of life circumstances but of {self} map architecture. Two people with identical life circumstances will have wildly different aggregate EoE outcomes if their {self} map power distributions differ. This is the computational basis for Stoic philosophy, Buddhist non-attachment, and ACT (Acceptance and Commitment Therapy) — all of which, in different vocabularies, recommend reducing the power of non-survival {self} items. An AI that can model a user's {self} map topology and detect "unhealthy" power distributions (many high-power items, contradictory attachments) could provide the most personalised, mechanistically-grounded wellbeing intervention ever built — not by changing the world, but by recalibrating the map.</div>
</div>
</div>

<div class="h-num">
<div class="h-n">W4</div>
<div class="h-block">
<div class="h-title">The compassion fatigue prevention architecture</div>
<div class="h-body">Compassion fatigue occurs when a clinician's own EoEs are chronically activated by patients' suffering — not just their embedded-map vicarious EoEs, but actual self-threatening EoEs on their own {professional identity}, {moral values}, and {physical wellbeing}. The EoE predicts the threshold: fatigue becomes pathological when the clinician's own severity scores exceed 3.0 across multiple {self} items simultaneously. An AI empathy buffer — handling the first emotional contact and emotional processing before escalating to the clinician — would absorb the highest-intensity EoE activations, protecting clinician bandwidth for cases requiring full human embedded-map construction. This reframes AI assistance from cost-reduction to clinician wellbeing protection.</div>
</div>
</div>

<div class="h-num">
<div class="h-n">W5</div>
<div class="h-block">
<div class="h-title">The confidence variable is therapy's most underused lever</div>
<div class="h-body">Severity = (power × intensity × confidence)/30. Therapists have developed elaborate techniques for targeting power (attachment work, values clarification) and intensity (exposure therapy, EMDR, cognitive restructuring). But confidence — the certainty of the perception — is the most tractable variable and the most underused. Rumination is high-intensity, high-confidence reprocessing of the same perception. Anxiety is projection of high-confidence threat futures. Reframing ("but are you certain that's what they meant?") is a confidence reduction intervention. An AI that systematically tracks and targets the confidence variable could produce emotional regulation outcomes faster than any technique targeting power or intensity. This is a novel clinical framework and potentially the most important practical application of the EoE.</div>
</div>
</div>

<div class="h-num">
<div class="h-n">W6</div>
<div class="h-block">
<div class="h-title">Empathy is asymmetrically distributed in the EoE — and this explains moral circle expansion</div>
<div class="h-body">The EoE predicts exactly who we empathise with and why: power gradient on {self} map determines embedded map richness. Strangers have power ~0, so embedded maps are nearly empty, so empathic EoEs are nearly impossible — not immoral, just computationally unavailable. Expanding the moral circle (empathy for distant others, different species, future generations) is therefore a {self} map expansion problem: how do we add items to the map with sufficient power to enable embedded-map empathic EoEs? This is the mechanism underlying narrative immersion (fiction adds low-power {self} items for characters), charitable giving psychology (identifiable victim effect), and all moral education. An AI that deliberately expands users' {self} maps — by personalising the suffering of abstract others — could be the most powerful moral education tool ever built.</div>
</div>
</div>

future:`
<div class="sl">10-year research programme — from theory to deployment</div>

<div class="sl">Phase 1 (Years 1–2) — foundational instruments</div>
<div class="g2">
<div class="card">
<div class="ct">Build the EoE annotation layer for EmpatheticDialogues</div>
<div class="cb">Annotate existing 25K conversation dataset with {self} item, power estimate, integration status, EoE emotion family, appropriate strategy. Train LLM annotators using expert-validated seed set. Validate against EPITOME scores. Deliverable: EoE-EmD dataset. Publish as NLP resource paper.</div>
</div>
<div class="card">
<div class="ct">Develop the Embedded Map Accuracy Score (EMAS) metric</div>
<div class="cb">New empathy evaluation metric: does the response correctly name specific {self} items, estimate severity, match integration phase, and apply appropriate strategy? Validated against expert human ratings. Publish as methodology paper. This creates a metric that can anchor all subsequent work.</div>
</div>
<div class="card">
<div class="ct">Sympathy-Empathy-Compassion classifier</div>
<div class="cb">Train a model to classify responses as contagion/sympathy/affective empathy/cognitive empathy/compassion using EoE linguistic signatures. Apply retrospectively to Howcroft's 15 studies to determine what level of other-directed emotion AI "empathy" actually represents. Publish as a reanalysis + methods paper.</div>
</div>
<div class="card">
<div class="ct">Phase-matching clinical trial (H3)</div>
<div class="cb">2×2 within-subjects RCT: integration-phase-matched vs mismatched AI response × high vs low severity. Outcome: patient-rated empathy (CARE), emotional regulation self-report, physiological arousal (HRV). First direct test of phase-matching hypothesis. Target: JAMA or BMJ.</div>
</div>
</div>

<div class="sl">Phase 2 (Years 2–4) — system building</div>
<div class="g2">
<div class="card">
<div class="ct">EoE-native AI empathy system (all 6 modules)</div>
<div class="cb">Implement the full pipeline: {self} map builder → integration detector → severity predictor → strategy selector → calibrated generator → compassion threshold. Evaluate on EoE-EmD, EPITOME, ESCEval, EMAS, and direct patient-rated CARE. Compare to GPT-4o baseline. Publish as system paper + clinical evaluation.</div>
</div>
<div class="card">
<div class="ct">Voice-enabled empathy study (H20)</div>
<div class="cb">First systematic comparison of text vs voice AI empathy. Use AEQ-Bench + IEMOCAP. Measure prosody-based integration status detection accuracy. Prediction: voice AI narrows but doesn't eliminate text AI advantage. Target: Nature Human Behaviour or ACL.</div>
</div>
<div class="card">
<div class="ct">Cross-cultural {self} map study (H10)</div>
<div class="cb">Collect patient-reported empathy ratings for AI responses in English, Mandarin, Arabic, Spanish, Hindi. Elicit ground-truth {self} maps from patients in each culture. Measure EMAS across cultures. Quantify WEIRD bias in GPT-4 empathy. Publish with fine-tuned culturally-calibrated models.</div>
</div>
<div class="card">
<div class="ct">Longitudinal therapeutic alliance (H18)</div>
<div class="cb">8-week RCT: persistent {self} map AI vs session-only AI vs human therapist. Outcomes: WAI (Working Alliance Inventory), PHQ-9, GAD-7, CARE. First longitudinal test of AI empathy therapeutic benefit. Target: Lancet Digital Health or NEJM Evidence.</div>
</div>
</div>

<div class="sl">Phase 3 (Years 4–7) — frontier applications</div>
<div class="g2">
<div class="card">
<div class="ct">{Self} map topology as mental health diagnostic</div>
<div class="cb">Train classifiers to detect depression (integrated high-power devaluation signature) and anxiety (pending-threat high-power signature) from natural language {self} map features. Validate against DSM criteria and PHQ/GAD. Compare to existing NLP depression detection (which uses surface sentiment, missing the structural signal).</div>
</div>
<div class="card">
<div class="ct">FEP-grounded artificial suffering (H17)</div>
<div class="cb">Implement Feng et al. 2022 artificial pain model + MNS mirroring in a healthcare dialogue agent. Compare affective empathy ratings to standard LLM. Test whether internal-state-grounded responses feel qualitatively different to patients. This addresses the "compassion illusion" question directly.</div>
</div>
<div class="card">
<div class="ct">Moral circle expansion via AI (W6)</div>
<div class="cb">Develop AI system that personalises the suffering of abstract others (climate change, global poverty) using EoE {self} map expansion techniques. Measure downstream prosocial behaviour. Potentially the most impactful non-clinical application of the entire framework.</div>
</div>
<div class="card">
<div class="ct">AI as compassion fatigue prevention tool</div>
<div class="cb">Deploy EoE-native AI as first-contact system in NHS/hospital settings. Measure clinician MBI burnout scores before/after. Track patient empathy ratings for human consultations following AI pre-screening. Test whether AI absorption of high-EoE-load conversations protects clinician bandwidth for complex cases.</div>
</div>
</div>

manifesto:`
<div class="sl">A research manifesto — what this work is really about</div>

<div class="hl hlp">This is not primarily a paper about AI chatbots. It is about the nature of empathy, the architecture of mind, and what it means to be genuinely understood by another — whether that other is biological or computational. The AI question is the sharp point of a much deeper inquiry.</div>

<div class="sl">The three radical claims</div>
<div class="card">
<div class="ct">Claim 1 — Empathy is a computation, not a feeling</div>
<div class="cb">The traditional view: empathy is constituted by felt shared experience. You empathise when you feel what another feels. The EoE + Howcroft finding challenges this directly. If what the recipient of empathy needs is an accurate model of their {self} map, expressed with appropriate severity and phase-matching, then the empathiser's inner experience is a side effect, not a requirement. The computation (embedded-map EoE) is what produces the therapeutic outcome. This doesn't mean feelings are irrelevant — they often guide the computation in humans — but they are not constitutive of empathy's function. This is a radical claim that will generate debate, and that debate is the most valuable academic contribution possible.</div>
</div>
<div class="card">
<div class="ct">Claim 2 — Human empathy failure is primarily architectural, not motivational</div>
<div class="cb">Most empathy training focuses on motivating clinicians to care more. The EoE suggests this is the wrong target. The clinicians who fail at empathy are not failing because they don't want to empathise — they're failing because their competing EoEs crowd out embedded-map construction bandwidth, because they project their own {self} maps onto patients, and because they don't detect integration status under time pressure. These are architectural failures, not motivational ones. Training should therefore target specific architectural capacities: embedded-map construction from limited signal, integration-status detection, phase-matched response selection. This reframes the entire clinical empathy training industry.</div>
</div>
<div class="card">
<div class="ct">Claim 3 — {Self} map health is wellbeing</div>
<div class="cb">The EoE implies that subjective wellbeing — happiness and unhappiness — is an emergent property of {self} map topology interacting with reality. This is not a new idea (Buddhism, Stoicism, ACT all say versions of it) but the EoE is the first framework that makes it mathematically precise, computationally testable, and linguistically detectable. If this is right, then the most impactful possible intervention for human flourishing is not changing life circumstances but recalibrating {self} map power distributions. An AI that can do this at scale — gently, accurately, without manipulation — is not just a mental health tool. It is the most powerful technology for human flourishing ever conceived. This is the true ambition of the research programme.</div>
</div>

<div class="sep"></div>
<div class="sl">The ethical imperative</div>
<div class="hl hlc">This research programme must be conducted with explicit ethical architecture. The same understanding of {self} map mechanics that enables genuine empathy also enables manipulation at scale. An AI that knows your highest-power {self} items and can model your EoE responses with precision is the most powerful persuasion tool imaginable. The ethical commitment of this research must be: use {self} map knowledge only to reduce severity, never to increase it; to support autonomy, never to exploit attachment; to increase confidence accuracy, never to artificially inflate it. This ethical framework must be built into the research from the first paper, not added as an afterthought. Anthropic's Constitutional AI and alignment research (the same organisation developing Claude) is the natural technical partner for this ethical architecture.</div>

<div class="sl">The single sentence that captures it</div>
<div class="hl hlt" style="font-size:14px;line-height:1.8;"><em>We are building a science of being understood — and discovering that the most accurate understanders may be the ones with the least to lose from understanding you.</em></div>
